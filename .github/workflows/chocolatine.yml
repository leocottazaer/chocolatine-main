name: chocolatine

on:
  push:
  pull_request:

env:
  EXECUTABLES: "mysh"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    if: ${{ !startsWith(github.ref, 'refs/heads/no-ga/') && github.repository != 'EpitechPGE1-2025/G-DOP-200-LYN-2-1-chocolatine-11' }}
    runs-on: ubuntu-latest

    container:
      image: epitechcontent/epitest-docker

    env:
      CC: epiclang

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run banana coding style check
        run: |
          banana-check-repo . 2>&1 | tee banana.log

      - name: Display coding style errors
        run: |
          if grep -q "\[Banana\]" banana.log; then
            echo "Banana coding style errors detected:"
            grep "\[Banana\]" banana.log | while IFS= read -r line; do
              file=$(echo "$line" | cut -d ':' -f1)
              echo "::error file=$file::$line"
            done
            exit 1
          fi

      - name: Compile project
        run: make
        timeout-minutes: 2

      - name: Check executables
        run: |
          for exe in $(echo $EXECUTABLES | tr ',' ' '); do
            if [ ! -f "$exe" ] || [ ! -x "$exe" ]; then
              echo "::error file=$exe::Binary not found or not executable"
              exit 1
            fi
          done

      - name: Clean project
        run: make fclean

  run_tests:
    name: Run tests
    needs: check_compilation_and_coding_style
    if: ${{ !startsWith(github.ref, 'refs/heads/no-ga/') && github.repository != 'EpitechPGE1-2025/G-DOP-200-LYN-2-1-chocolatine-11' }}
    runs-on: ubuntu-latest

    container:
      image: epitechcontent/epitest-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror
    needs: run_tests
    if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/no-ga/') && github.repository != 'EpitechPGE1-2025/G-DOP-200-LYN-2-1-chocolatine-11' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check MIRROR_SSH_URL
        run: |
          if [ -z "${{ secrets.MIRROR_SSH_URL }}" ]; then
            echo "MIRROR_SSH_URL is not set. Skipping push."
            exit 0
          fi

      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ vars.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}