name: Chocolatey

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL }}
  EXECUTABLES: mysh

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

jobs:
    check_compilation_and_coding_style:
      if: github.repository_owner != 'EpitechPGE1-2025'
      runs-on: ubuntu-latest
      container:
        image: epitechcontent/epitest-docker
      steps:
        - uses: actions/checkout@v6

        - name: coding style
          run: banana-check-report .

        - name: Build
          timeout-minutes: 2
          run: make CC=epiclang

        - name: Clean
          run: make clean
        - name: verif_executable
          run: |
            for executable in $(echo $EXECUTABLES | tr ',' ' '); do
              test -x $executable || exit 1;
            done
    run_tests:
      needs: check_compilation_and_coding_style
      runs-on: ubuntu-latest
      container:
        image: epitechcontent/epitest-docker
      steps:
        - uses: actions/checkout@v6

        - name: run_tests
          timeout-minutes: 2
          run: make tests_run
    push_to_mirror:
      needs: run_tests
      if: github.event_name == 'push'
      runs-on: ubuntu-latest
      steps:
        - uses: pixta-dev/repository-mirroring-action@v1.1.1

          with:
            target_repo_url: ${{ env.MIRROR_SSH_URL }}
            ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}